<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CharmKey Studio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shiela.css">
</head>

<body>

<nav>
  <h1>CharmKey 🔑</h1>
  <div class="cart">🛒 <span id="count">0</span></div>
</nav>

<header class="hero">
  <h2>Cute. Aesthetic. You.</h2>
  <p>Scroll to explore our collections</p>
</header>

<section class="section">
  <h2>Our Keychains</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a41552231693?auto=format&fit=crop&w=500&q=60">
      <h3>Bear Charm</h3>
      <button onclick="add('Bear Charm')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&w=500&q=60">
      <h3>Heart Keychain</h3>
      <button onclick="add('Heart Keychain')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1621460249460-86a0a7f2b0d5?auto=format&fit=crop&w=500&q=60">
      <h3>Mini Plush</h3>
      <button onclick="add('Mini Plush')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6?auto=format&fit=crop&w=500&q=60">
      <h3>Charm Set</h3>
      <button onclick="add('Charm Set')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=500&q=60">
      <h3>Luxury Charm</h3>
      <button onclick="add('Luxury Charm')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=500&q=60">
      <h3>Minimal Keychain</h3>
      <button onclick="add('Minimal Keychain')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512499617640-c2f999098c1a?auto=format&fit=crop&w=500&q=60">
      <h3>Notebook Charm</h3>
      <button onclick="add('Notebook Charm')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526045612212-70caf35c14df?auto=format&fit=crop&w=500&q=60">
      <h3>Pastel Charm</h3>
      <button onclick="add('Pastel Charm')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?auto=format&fit=crop&w=500&q=60">
      <h3>Flower Charm</h3>
      <button onclick="add('Flower Charm')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=500&q=60">
      <h3>Makeup Charm</h3>
      <button onclick="add('Makeup Charm')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=500&q=60">
      <h3>Couple Keychain</h3>
      <button onclick="add('Couple Keychain')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?auto=format&fit=crop&w=500&q=60">
      <h3>Custom Name</h3>
      <button onclick="add('Custom Name')">Add</button>
    </div>

  </div>
</section>

<!-- CART -->
<div id="cartBox">
  <h3>Your Cart</h3>
  <ul id="list"></ul>
  <button onclick="closeCart()">Close</button>
</div>

<button class="cartBtn" onclick="openCart()">View Cart</button>

<script src="script.js"></script>
</body>
</html>
